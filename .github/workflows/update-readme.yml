name: Update README with Pinned Repos

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from GitHub UI
  push:
    branches: [main]        # also runs on every push to main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push changes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install node-fetch@3
        working-directory: scripts

      - name: Run README updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: senthil-prabhu-sudo
        run: node scripts/update-readme.js

      - name: Commit and push if README changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: auto-sync pinned repos [skip ci]"
          git push
